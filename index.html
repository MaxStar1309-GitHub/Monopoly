<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly — Меню</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="main">
        <div id="greeting">
            <h1>Монополия онлайн</h1>
        </div>

        <div id="menu-buttons">
            <button id="btn-new" class="menu-btn"><h3>🎲 Новая игра</h3></button>
            <button id="btn-join" class="menu-btn"><h3>🔑 Присоединиться</h3></button>
        </div>
    </div>

    <script>
        document.getElementById("btn-new").onclick = () => {
            window.location.href = "new_game.html";
        };
        document.getElementById("btn-join").onclick = () => {
            window.location.href = "connect.html";
        };
    </script>
</body>
</html>
