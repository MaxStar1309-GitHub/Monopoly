<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly — Новая игра</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="main" style="max-width: 640px">
        <div id="greeting">
            <h1>Настройка игры</h1>
        </div>

        <div class="lobby-form">
            <h3>Количество игроков (2–6):
                <input type="number" id="max-players" value="2" min="2" max="6">
            </h3>
        </div>

        <h3 class="settings-heading">Режим</h3>
        <div class="mode-options">
            <label class="mode-card">
                <input type="radio" name="mode" value="classic" checked>
                <div class="mode-card-body">
                    <div class="mode-name">Классика</div>
                    <div class="mode-desc">Стандартные правила Монополии. Стартовый баланс $1500.</div>
                </div>
            </label>
            <label class="mode-card">
                <input type="radio" name="mode" value="blitz">
                <div class="mode-card-body">
                    <div class="mode-name">Блиц</div>
                    <div class="mode-desc">Стартовый баланс $800. Аренда ×2. Быстрые партии.</div>
                </div>
            </label>
        </div>

        <h3 class="settings-heading">Правила</h3>
        <div class="modifier-options">
            <label class="mod-card">
                <input type="checkbox" name="feature" value="casino" checked>
                <div class="mod-card-body">
                    <div class="mod-name">🎰 Казино</div>
                    <div class="mod-desc">Клетка казино с слот-машиной.</div>
                </div>
            </label>
            <label class="mod-card">
                <input type="checkbox" name="feature" value="auction" checked>
                <div class="mod-card-body">
                    <div class="mod-name">🔨 Аукцион</div>
                    <div class="mod-desc">При отказе от покупки улица продаётся на аукционе.</div>
                </div>
            </label>
        </div>

        <h3 class="settings-heading">Модификаторы (можно несколько)</h3>
        <div class="modifier-options">
            <label class="mod-card">
                <input type="checkbox" name="modifier" value="magnate">
                <div class="mod-card-body">
                    <div class="mod-name">🏛️ Магнат</div>
                    <div class="mod-desc">Все аренды +10%.</div>
                </div>
            </label>
            <label class="mod-card">
                <input type="checkbox" name="modifier" value="chances">
                <div class="mod-card-body">
                    <div class="mod-name">🃏 Шансы</div>
                    <div class="mod-desc">Карты Шанс/Казна: +25% к получаемым/списываемым суммам.</div>
                </div>
            </label>
            <label class="mod-card">
                <input type="checkbox" name="modifier" value="gambler">
                <div class="mod-card-body">
                    <div class="mod-name">🎰 Азартный</div>
                    <div class="mod-desc">В казино +2 символа (ниже шанс выигрыша), но выигрыши ×1.5.</div>
                </div>
            </label>
        </div>

        <h3 class="settings-heading">Хост</h3>
        <div class="lobby-form">
            <h3>Твоё имя: <input type="text" id="host-name" maxlength="16"></h3>
            <h3>Цвет: <input type="color" id="host-color"></h3>
        </div>

        <button id="btn-create" class="big-create-btn"><h3>🎲 Создать игру</h3></button>
        <button id="btn-back" class="secondary-btn" style="margin-top:10px"><h4>← Назад в меню</h4></button>

        <div id="error-message"></div>
    </div>

    <script>
        const socket = io();

        function randomColor() {
            const h = Math.floor(Math.random() * 360);
            const s = 65 + Math.floor(Math.random() * 25);
            const l = 45 + Math.floor(Math.random() * 15);
            return hslToHex(h, s, l);
        }
        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            const k = (n) => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = (n) => {
                const c = l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
                return Math.round(255 * c).toString(16).padStart(2, "0");
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }
        document.getElementById("host-color").value = randomColor();

        const errorMsg = document.getElementById("error-message");
        function showError(msg) {
            errorMsg.innerText = msg;
            setTimeout(() => { errorMsg.innerText = ""; }, 4000);
        }

        document.getElementById("btn-back").onclick = () => {
            window.location.href = "index.html";
        };

        document.getElementById("btn-create").onclick = () => {
            const maxPlayers = parseInt(document.getElementById("max-players").value, 10);
            const name = document.getElementById("host-name").value.trim();
            const color = document.getElementById("host-color").value;
            const mode = document.querySelector('input[name="mode"]:checked')?.value || "classic";
            const modifiers = Array.from(document.querySelectorAll('input[name="modifier"]:checked')).map((c) => c.value);
            const features = {
                casino: !!document.querySelector('input[name="feature"][value="casino"]:checked'),
                auction: !!document.querySelector('input[name="feature"][value="auction"]:checked'),
            };

            if (!name) { showError("Введи имя."); return; }
            socket.emit("lobby:create", { maxPlayers, playerName: name, playerColor: color, mode, modifiers, features });
        };

        socket.on("lobby:created", ({ lobbyId, you }) => {
            sessionStorage.setItem("lobbyId", lobbyId);
            sessionStorage.setItem("me", JSON.stringify(you));
            sessionStorage.setItem("isHost", "1");
            window.location.href = "lobby.html";
        });

        socket.on("lobby:joined", ({ lobbyId, you }) => {
            sessionStorage.setItem("lobbyId", lobbyId);
            sessionStorage.setItem("me", JSON.stringify(you));
            sessionStorage.setItem("isHost", "0");
            window.location.href = "lobby.html";
        });

        socket.on("lobby:error", ({ message }) => {
            showError(message);
        });
    </script>
</body>
</html>
